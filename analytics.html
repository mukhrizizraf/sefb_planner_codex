<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SEFB Planner / CGPA Simulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;600;700&family=Libre+Caslon+Text:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/img/sefb.png">
  <link rel="stylesheet" href="assets/css/styles.css?v=20260608b">
</head>
<body data-page="analytics">
  <div class="site-shell">
    <aside class="side">
      <div class="brand"><img class="brand-mark" src="assets/img/sefb.png" alt="SEFB"><div class="brand-title">SEFB Degree Planner</div><div class="brand-sub">UNIVERSITI UTARA MALAYSIA</div></div>
      <nav class="nav" data-nav></nav>
    </aside>
    <main class="main">
      <div class="container">
        <div class="topbar">
          <div><h2>CGPA Simulation</h2></div>
          <div class="program-controls"><select class="select" data-program-select></select><span id="trackControl"></span><span id="pathControl"></span><span id="langControl"></span></div>
        </div>
        <section class="grid cols-2">
          <div class="stat"><div class="label">Projected CGPA</div><div class="stat-value" id="analyticsCgpa">--</div></div>
          <div class="stat"><div class="label">Standing</div><div class="stat-value" id="analyticsStanding">--</div></div>
        </section>
        <div class="section-head"><h2>GPA By Semester</h2></div>
        <section class="panel" id="gpaRows"></section>
        <div class="section-head"><h2>Credit Load</h2></div>
        <section class="panel" id="creditBars"></section>
      </div>
    </main>
  </div>
  <script src="assets/js/sefb-data.js"></script>
  <script src="assets/js/app.js?v=20260608b"></script>
</body>
</html>
