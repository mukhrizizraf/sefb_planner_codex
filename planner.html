<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SEFB Planner / Semester Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;600;700&family=Libre+Caslon+Text:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/img/sefb.png">
  <link rel="stylesheet" href="assets/css/styles.css?v=20260603c">
</head>
<body data-page="planner">
  <div class="site-shell">
    <aside class="side">
      <div class="brand"><img class="brand-mark" src="assets/img/sefb.png" alt="SEFB"><div class="brand-title">SEFB Degree Planner</div><div class="brand-sub">Semester studio</div></div>
      <nav class="nav" data-nav></nav>
    </aside>
    <main class="main">
      <div class="container">
        <div class="topbar">
          <div><div class="eyebrow">Planner</div><h2 id="plannerTitle">Semester Planner</h2></div>
          <div class="program-controls">
            <select class="select" data-program-select></select>
            <span id="trackControl"></span>
            <span id="pathControl"></span>
            <span id="langControl"></span>
            <button class="button solid" id="loadRecommended">Load recommended</button>
            <button class="button danger" id="resetPlanner">Reset</button>
            <button class="button" id="addSemester">Add semester</button>
          </div>
        </div>
        <section class="panel category-legend" id="plannerLegend"></section>
        <section class="grid cols-2" id="semesters"></section>
      </div>
    </main>
  </div>
  <script src="assets/js/sefb-data.js"></script>
  <script src="assets/js/app.js?v=20260603c"></script>
</body>
</html>
